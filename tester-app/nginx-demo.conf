# Serves the webpack-built demo from tester-app/dist at:
#   https://sqlite-wasm-viewer.mysticeggs.xyz/demo/
#
# Replace BOTH alias paths with the same absolute directory on your server (must end with /).
# Do not use `set $var` + `alias $var` — nginx rejects or mishandles variable aliases.
#
# Include from http {}, e.g.:
#   include /path/to/sqlite-wasm-viewer/tester-app/nginx-demo.conf;

server {
    listen 443 ssl http2;
    server_name sqlite-wasm-viewer.mysticeggs.xyz;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    gzip on;
    gzip_types text/css application/javascript application/json application/wasm;

    location = /demo {
        return 301 https://$host/demo/;
    }

    location = /demo/index.html {
        alias /path/to/sqlite-wasm-viewer/tester-app/dist/index.html;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cache-Control "no-cache";
    }

    location /demo/ {
        alias /path/to/sqlite-wasm-viewer/tester-app/dist/;
        index index.html;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        types {
            application/wasm wasm;
        }
    }
}
